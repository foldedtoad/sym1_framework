# =============================================================================
# sym1.cfg  —  ld65 Linker Configuration for SYM-1 (4K RAM)
# =============================================================================
# Memory layout:
#   $0000–$00FF   Zero Page       (256 bytes)
#   $0100–$01FF   Stack           (256 bytes — hardware)
#   $0200–$04FF   Frame buffer    (768 bytes — TUI scratch)
#   $0500–$0BFF   User program    (1792 bytes)
#   $0C00–$0EFF   TUI library     (768 bytes — resident)
#   $0F00–$0FFF   System scratch  (256 bytes — linker BSS overflow)
#   $8000–$9FFF   Supermonitor    (ROM — not in output)
# =============================================================================

MEMORY {
    ZP:     start = $0000, size = $00E0, type = rw, define = yes;
    STACK:  start = $0100, size = $0100, type = rw;
    FRBUF:  start = $0200, size = $0300, type = rw, define = yes;
    CODE:   start = $0500, size = $0700, type = rw, define = yes, fill = yes, fillval = $EA;
    TUI:    start = $0C00, size = $0300, type = rw, define = yes, fill = yes, fillval = $EA;
    BSS:    start = $0F00, size = $00FF, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE:   load = ZP,    type = zp,   optional = yes;
    FRAMEBUF:   load = FRBUF, type = bss,  optional = yes;
    STARTUP:    load = CODE,  type = ro;
    CODE:       load = CODE,  type = ro;
    RODATA:     load = CODE,  type = ro;
    DATA:       load = CODE,  type = rw;
    BSS:        load = BSS,   type = bss,  optional = yes;
    TUI_CODE:   load = TUI,   type = ro,   optional = yes;
    TUI_DATA:   load = TUI,   type = rw,   optional = yes;
}

FEATURES {
    STARTADDRESS: default = $0500;
}
